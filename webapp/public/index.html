        // Utility Functions
        const generateHash = () => {
            const chars = '0123456789abcdef';
            let hash = '';
            for (let i = 0; i < 64; i++) {
                hash += chars.charAt(Math.floor(Math.random() * 16));
            }
            return hash;
        };

        const generateMerkleTree = (depth = 3) => {
            const tree = {
                id: generateHash().substring(0, 16),
                level: 0,
                hash: generateHash(),
                children: []
            };

            const buildTree = (node, currentDepth) => {
                if (currentDepth < depth) {
                    for (let i = 0; i < 2; i++) {
                        const child = {
                            id: generateHash().substring(0, 16),
                            level: currentDepth + 1,
                            hash: generateHash(),
                            children: []
                        };
                        buildTree(child, currentDepth + 1);
                        node.children.push(child);
                    }
                }
            };

            buildTree(tree, 0);
            return tree;
        };

                                        {proofs.map((proof) => (
                                            <tr key={proof.id} class="border-b border-gray-200 hover:bg-gray-50">
                                                <td class="py-3 px-4 font-mono text-xs text-gray-600">{proof.hash.substring(0, 16)}...</td>
                                                <td class="py-3 px-4">{proof.model}</td>
                                                <td class="py-3 px-4">
                                                    <span class={`inline-block px-3 py-1 rounded-full text-xs font-semibold ${proof.status === 'verified' ? 'bg-green-100 text-green-700' : proof.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                                                        {proof.status.charAt(0).toUpperCase() + proof.status.slice(1)}
                                                    </span>
                                                </td>
                                                <td class="py-3 px-4">{proof.confidence}%</td>
                                                <td class="py-3 px-4 text-gray-600">{new Date(proof.timestamp).toLocaleDateString()}</td>
                                                <td class="py-3 px-4">
                                                    <button onClick={() => setSelectedProof(proof)} class="text-blue-600 hover:underline">View</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Proof Chain Timeline */}
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-2xl font-bold mb-6">Proof Chain Timeline</h2>
                            <div class="space-y-6">
                                {proofs.slice(0, 3).map((proof, idx) => (
                                    <div key={proof.id} class="flex gap-4">
                                        <div class="flex flex-col items-center">
                                            <div class={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold ${proof.status === 'verified' ? 'bg-green-500' : proof.status === 'pending' ? 'bg-yellow-500' : 'bg-red-500'}`}>
                                                {proof.status === 'verified' ? 'â' : proof.status === 'pending' ? 'â±' : 'â'}
                                            </div>
                                            {idx < proofs.length - 1 && <div class="w-1 h-12 bg-gray-200 mt-2"></div>}
                                        </div>
                                        <div class="pb-6">
                                            <h3 class="font-semibold text-gray-900">{proof.model} Model</h3>
                                            <p class="text-sm text-gray-600 mt-1">{new Date(proof.timestamp).toLocaleString()}</p>
                                            <p class="text-xs text-gray-500 mt-2 font-mono">{proof.hash.substring(0, 32)}...</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Proof Detail Modal */}
                    {selectedProof && (
                        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div class="bg-white rounded-lg max-w-2xl w-full max-h-screen overflow-y-auto">
                                <div class="p-8">
                                    <div class="flex justify-between items-center mb-6">
                                        <h2 class="text-2xl font-bold">Proof Details</h2>
                                        <button onClick={() => setSelectedProof(null)} class="text-gray-500 hover:text-gray-700">â</button>
                                    </div>

                                    <div class="space-y-6">
                                        <div class="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-1">Proof ID</label>
                                                <p class="font-mono text-sm text-gray-600">{selectedProof.id}</p>
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
                                                <p class="text-sm text-gray-600">{selectedProof.model}</p>
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                                                <span class={`inline-block px-3 py-1 rounded-full text-xs font-semibold ${selectedProof.status === 'verified' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                                    {selectedProof.status.charAt(0).toUpperCase() + selectedProof.status.slice(1)}
                                                </span>
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-1">Confidence</label>
                                                <p class="text-sm text-gray-600">{selectedProof.confidence}%</p>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Merkle Root</label>
                                            <p class="font-mono text-xs text-gray-600 break-all bg-gray-50 p-3 rounded-lg">{selectedProof.merkleRoot}</p>
                                        </div>

                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Hash</label>
                                            <p class="font-mono text-xs text-gray-600 break-all bg-gray-50 p-3 rounded-lg">{selectedProof.hash}</p>
                                        </div>

                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Proof Path</label>
                                            <div class="space-y-2">
                                                {selectedProof.proofPath.map((hash, idx) => (
                                                    <div key={idx} class="font-mono text-xs text-gray-600 bg-gray-50 p-2 rounded-lg flex items-center gap-2">
                                                        <span class="text-gray-400">Level {idx}:</span> {hash}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                            <h3 class="font-semibold text-blue-900 mb-2">Verification Steps</h3>
                                            <ol class="space-y-2 text-sm text-blue-800">
                                                <li>1. Hash model output with SHA-256</li>
                                                <li>2. Construct Merkle path from leaf to root</li>
                                                <li>3. Verify each node's hash computation</li>
                                                <li>4. Compare root hash with stored commitment</li>
                                                <li>5. Return verification status and confidence</li>
                                            </ol>
                                        </div>

                                        <button onClick={() => setSelectedProof(null)} class="w-full py-2 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const BillingPage = ({ currentUser, onNavigate }) => {
            const [selectedPlan, setSelectedPlan] = useState('pro');

            return (
                <div class="min-h-screen bg-gray-50 py-20 px-4">
                    <div class="max-w-6xl mx-auto">
                        <h1 class="text-4xl font-bold text-center mb-4">Manage Your Subscription</h1>
                        <p class="text-center text-gray-600 mb-16">Current plan: <span class="font-semibold">Pro</span></p>

                        <div class="grid md:grid-cols-3 gap-8 mb-12">
                            {[
                                { id: 'free', name: "Free", price: "$0", limit: "100 proofs/mo", features: ["SHA-256 Merkle trees", "Basic verification", "24-hour proof retention", "Community support"], current: false },
                                { id: 'pro', name: "Pro", price: "$49", limit: "10K proofs/mo", features: ["All Free features", "Priority verification", "90-day retention", "Email support", "API access", "Custom integrations"], current: true },
                                { id: 'enterprise', name: "Enterprise", price: "$199", limit: "Unlimited proofs", features: ["All Pro features", "Unlimited retention", "24/7 phone support", "Dedicated account manager", "SLA guarantee", "On-premise option"], current: false }
                            ].map((plan) => (
                                <div key={plan.id} class={`rounded-xl p-8 border-2 ${plan.current ? 'bg-blue-50 border-blue-400' : 'bg-white border-gray-200'}`}>
                                    {plan.current && <div class="mb-4 inline-block px-3 py-1 bg-blue-600 text-white rounded-full text-xs font-semibold">Current Plan</div>}
                                    <h3 class="text-2xl font-bold mb-2">{plan.name}</h3>
                                    <div class="text-4xl font-bold mb-2">{plan.price}<span class="text-lg">/mo</span></div>
                                    <div class="text-sm text-gray-600 mb-6">{plan.limit}</div>
                                    <ul class="space-y-3 mb-8">
                                        {plan.features.map((f, i) => (
                                            <li key={i} class="flex items-center gap-2 text-sm">
                                                <span class="text-green-500">â</span> {f}
                                            </li>
                                        ))}
                                    </ul>
                                    <button class={`w-full py-2 rounded-lg font-semibold transition ${plan.current ? 'bg-gray-300 text-gray-600 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}`} disabled={plan.current}>
                                        {plan.current ? 'Current Plan' : 'Upgrade'}
                                    </button>
                                </div>
                            ))}
                        </div>

                        {/* Billing History */}
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-2xl font-bold mb-6">Billing History</h2>
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="border-b border-gray-200">
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">Date</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">Description</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">Amount</th>
                                        <th class="text-left py-3 px-4 font-semibold text-gray-700">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[
                                        { date: '2026-03-01', desc: 'Pro Plan - Monthly', amount: '$49.00', status: 'Paid' },
                                        { date: '2026-02-01', desc: 'Pro Plan - Monthly', amount: '$49.00', status: 'Paid' },
                                        { date: '2026-01-01', desc: 'Pro Plan - Monthly', amount: '$49.00', status: 'Paid' }
                                    ].map((item, idx) => (
                                        <tr key={idx} class="border-b border-gray-200 hover:bg-gray-50">
                                            <td class="py-3 px-4">{item.date}</td>
                                            <td class="py-3 px-4">{item.desc}</td>
                                            <td class="py-3 px-4 font-semibold">{item.amount}</td>
                                            <td class="py-3 px-4"><span class="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">{item.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('landing');
            const [currentUser, setCurrentUser] = useState(null);

            const handleNavigate = (page) => {
                if (page === 'dashboard' || page === 'billing') {
                    if (!currentUser) {
                        setCurrentPage('signin');
                        return;
                    }
                }
                setCurrentPage(page);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('landing');
            };

            const handleAuthSuccess = (user) => {
                setCurrentUser(user);
                setCurrentPage('dashboard');
            };

            return (
                <>
                    <Navbar currentUser={currentUser} onLogout={handleLogout} onNavigate={handleNavigate} />
                    {currentPage === 'landing' && <LandingPage onNavigate={handleNavigate} />}
                    {currentPage === 'signin' && <SignInPage onNavigate={handleNavigate} onAuthSuccess={handleAuthSuccess} />}
                    {currentPage === 'signup' && <SignUpPage onNavigate={handleNavigate} onAuthSuccess={handleAuthSuccess} />}
                    {currentPage === 'dashboard' && <Dashboard onNavigate={handleNavigate} />}
                    {currentPage === 'billing' && <BillingPage currentUser={currentUser} onNavigate={handleNavigate} />}
                </>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
